<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth"><head><script data-buildix-nav-interceptor="">
(function() {
  document.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target.tagName !== 'A' && target !== document.body) {
      target = target.parentElement;
    }
    if (target && target.tagName === 'A') {
      var href = target.getAttribute('href') || '';
      if (href.charAt(0) === '#') {
        e.preventDefault();
        e.stopPropagation();
        if (href.length > 1) {
          var targetEl = document.getElementById(href.substring(1));
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
        return false;
      }
    }
  }, true);
})();
</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Móvel | Office Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <script>
      window.lucide = {
        createIcons: function() {}
      };
    </script>
    
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
@theme {
            --color-primary: #111111;
            --color-secondary: #2A2A2A;
            --color-border-light: #E5E5E5;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
</style>
<style>
html.lenis { height: auto; }
.lenis.lenis-smooth { scroll-behavior: auto !important; }
body { overflow-x: hidden; background: #fff; margin: 0; }

#hero-canvas { 
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
}

.extreme-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
            transform: translate3d(-50%, 0, 0); 
            transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

/* EFEITO NOS PRODUTOS */
.product-card img {
    filter: grayscale(100%);
    transition: filter 0.5s ease, transform 0.5s ease;
}
.product-card:hover img, .product-card.active img {
    filter: grayscale(0%);
    transform: scale(1.05);
}

.nav-link {
            position: relative;
            color: #111;
        }
.nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: #111;
            transition: width 0.3s ease;
        }
.nav-link:hover::after { width: 100%; }
</style>
</head>
<body class="bg-white text-primary font-sans antialiased relative">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s ease-out;">
        <div style="width:16rem;height:0.5rem;background:rgba(255,255,255,0.3);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height: 100%; background: white; transition: 100ms ease-out; width: 0%;"></div>
        </div>
    </div>

    <header class="extreme-glass fixed top-6 left-1/2 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-10 py-4">
        <nav class="hidden md:flex items-center gap-8">
            <a href="#produtos" class="nav-link text-sm font-medium tracking-wide">Produtos</a>
        </nav>

        <a href="#" class="absolute left-1/2 -translate-x-1/2 select-none hover:scale-105 transition-transform duration-300 z-20">
            <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" alt="logo" class="logo h-8 md:h-10 lg:h-11 w-auto object-contain brightness-0">
        </a>

        <nav class="hidden md:flex items-center gap-8">
            <a href="#solucoes" class="nav-link text-sm font-medium tracking-wide">Soluções</a>
            <a href="#contato" class="nav-link text-sm font-medium tracking-wide">Fale Conosco</a>
        </nav>
    </header>

    <main>
        <section id="scroll-hero" style="height:400vh;position:relative;">
            <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
                <canvas id="hero-canvas"></canvas>
                <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.8),rgba(0,0,0,0.2) 50%,transparent);z-index:1;"></div>
                <div id="hero-text-container" class="absolute inset-0 z-10 flex flex-col items-center justify-center pointer-events-none px-6 text-center">
                    <h1 id="hero-title" class="font-serif text-5xl md:text-7xl lg:text-8xl font-bold text-white mb-6 tracking-tight leading-tight">
                        A Arte de Equipar<br>
                        <span class="italic text-white/90 font-light">Seu Espaço</span>
                    </h1>
                </div>
            </div>
        </section>

        <section class="py-32 px-6 md:px-12 max-w-7xl mx-auto relative z-20 bg-white">
            <div class="flex flex-col md:flex-row gap-16 items-start">
                <div class="w-full md:w-1/3">
                    <h2 class="font-serif text-3xl md:text-4xl leading-tight mb-6">Redefinindo o Padrão Corporativo.</h2>
                    <div class="w-12 h-[1px] bg-primary mb-6"></div>
                </div>
                <div class="w-full md:w-2/3">
                    <p class="text-lg md:text-xl text-primary/80 leading-relaxed font-light mb-8">
                        Acreditamos que o ambiente de trabalho molda a mente. Nossas peças não são apenas móveis; são instrumentos de foco e criação.
                    </p>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-[90rem] mx-auto border-t border-border-light relative z-20 bg-white">
            <h2 class="font-serif text-4xl mb-16">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-16"></div>
        </section>
    </main>

    <script>
        const products = [
            { id: "OF-01", name: "Cadeira Executiva Aura", material: "Couro Legítimo & Alumínio", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&q=80&w=1200" },
            { id: "ST-04", name: "Mesa Diretoria Nexus", material: "Nogueira Maciça & Vidro", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&q=80&w=1200" }
        ];

        document.getElementById('product-grid').innerHTML = products.map(prod => `
            <div class="product-card group cursor-pointer">
                <div class="relative w-full h-[500px] overflow-hidden rounded-2xl border border-border-light bg-[#F5F5F5] mb-6">
                    <img src="${prod.image}" class="absolute top-0 left-0 w-full h-full object-cover">
                </div>
                <h3 class="font-serif text-2xl">${prod.name}</h3>
                <p class="text-sm text-primary/60">${prod.material}</p>
            </div>
        `).join('');

        // Toque Mobile para os produtos
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('touchstart', () => card.classList.add('active'), {passive: true});
            card.addEventListener('touchend', () => setTimeout(() => card.classList.remove('active'), 300), {passive: true});
        });

        const lenis = new Lenis({ lerp: 0.1 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 52; 
        const images = [];
        let loadedImages = 0;

        const getPath = i => `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages / frameCount) * 100}%`;
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    render();
                }
            };
            img.src = getPath(i);
            images.push(img);
        }

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scrollTop = window.scrollY;
            const heroHeight = document.getElementById('scroll-hero').offsetHeight;
            const fraction = Math.max(0, Math.min(1, scrollTop / (heroHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));
            const img = images[frameIndex];
            if (img) {
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                context.drawImage(img, (canvas.width - img.width * ratio) / 2, (canvas.height - img.height * ratio) / 2, img.width * ratio, img.height * ratio);
            }
        }
        window.addEventListener('scroll', render);
        window.addEventListener('resize', render);
    </script>
</body></html>
