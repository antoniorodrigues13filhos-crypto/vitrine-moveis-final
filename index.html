<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vitrine Móvel | Office Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
@theme {
            --color-primary: #111111;
            --color-secondary: #2A2A2A;
            --color-border-light: #E5E5E5;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
</style>
<style>
/* Reset essencial */
html.lenis { height: auto; }
.lenis.lenis-smooth { scroll-behavior: auto !important; }
body { overflow-x: hidden; background: #fff; margin: 0; }

/* Canvas fixo no fundo da seção Hero */
#hero-canvas { 
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
}

.extreme-glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    left: 50%;
    transform: translateX(-50%);
}

/* Produtos */
.product-image-container img {
    filter: grayscale(100%);
    transition: filter 0.5s ease, transform 0.5s ease;
}
.product-card:active img, .product-card.active img, .product-card:hover img {
    filter: grayscale(0%);
    transform: scale(1.05);
}

#mobile-menu { transition: transform 0.4s ease-in-out; }
</style>
</head>
<body class="bg-white text-primary font-sans">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s;">
        <div style="width:12rem;height:2px;background:rgba(255,255,255,0.2);"><div id="progress-bar" style="height:100%;background:white;width:0%;"></div></div>
    </div>

    <header class="extreme-glass fixed top-6 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-8 py-4">
        <nav class="hidden md:flex gap-8">
            <a href="#produtos" class="text-sm font-medium">Produtos</a>
        </nav>
        <a href="#" class="select-none">
            <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" class="h-8 brightness-0">
        </a>
        <button onclick="toggleMenu()" class="md:hidden p-1 z-[60]">
            <svg id="menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <div id="mobile-menu" class="fixed inset-0 bg-white z-[55] translate-x-full flex flex-col items-center justify-center gap-10">
        <a href="#produtos" onclick="toggleMenu()" class="font-serif text-4xl">Produtos</a>
        <a href="#contato" onclick="toggleMenu()" class="font-serif text-4xl">Contato</a>
    </div>

    <main>
        <section id="scroll-hero" style="height:400vh; position:relative;">
            <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
                <canvas id="hero-canvas"></canvas>
                
                <div id="label-1" class="absolute top-[30%] left-[10%] opacity-0 transition-all duration-500 z-20">
                    <h3 class="text-white text-xl font-serif italic border-l border-white/30 pl-4">Alumínio</h3>
                </div>
                <div id="label-2" class="absolute top-[55%] right-[10%] opacity-0 transition-all duration-500 z-20">
                    <h3 class="text-white text-xl font-serif italic border-r border-white/30 pr-4 text-right">Couro</h3>
                </div>

                <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.6), transparent 80%); z-index:1;"></div>
                
                <div id="hero-text-container" class="absolute inset-0 z-10 flex flex-col items-center justify-center text-center px-6">
                    <h1 class="font-serif text-5xl md:text-8xl font-bold text-white">A Arte de Equipar<br><span class="italic text-white/80 font-light">Seu Espaço</span></h1>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-7xl mx-auto">
            <h2 class="font-serif text-4xl mb-16">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
        </section>
    </main>

    <script>
        // 1. Produtos
        const products = [
            { id: "01", name: "Cadeira Aura", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?q=80&w=1200" },
            { id: "02", name: "Mesa Nexus", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?q=80&w=1200" }
        ];

        document.getElementById('product-grid').innerHTML = products.map(p => `
            <div class="product-card">
                <div class="product-image-container relative h-[450px] overflow-hidden rounded-xl">
                    <img src="${p.image}" class="w-full h-full object-cover">
                </div>
                <div class="py-4"><h3 class="font-serif text-2xl">${p.name}</h3></div>
            </div>
        `).join('');

        // Toque Mobile
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('touchstart', () => card.classList.add('active'), {passive: true});
            card.addEventListener('touchend', () => card.classList.remove('active'), {passive: true});
        });

        // 2. Lenis (Scroll Suave)
        const lenis = new Lenis({ lerp: 0.1, touchMultiplier: 1.5 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // 3. Canvas Motor
        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 54;
        const images = [];
        let loadedImages = 0;
        let lastFrame = -1;

        function initCanvas() {
            canvas.width = window.innerWidth * window.devicePixelRatio;
            canvas.height = window.innerHeight * window.devicePixelRatio;
            context.scale(window.devicePixelRatio, window.devicePixelRatio);
            render(true);
        }

        const getPath = i => `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages/frameCount)*100}%`;
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
                    initCanvas();
                }
            };
            img.src = getPath(i);
            images.push(img);
        }

        function render(force = false) {
            const scrollTop = window.scrollY;
            const heroHeight = document.getElementById('scroll-hero').offsetHeight;
            const fraction = Math.max(0, Math.min(1, scrollTop / (heroHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));

            if (frameIndex !== lastFrame || force) {
                const img = images[frameIndex];
                if (img && img.complete) {
                    const ratio = Math.max(window.innerWidth / img.width, window.innerHeight / img.height);
                    const x = (window.innerWidth - img.width * ratio) / 2;
                    const y = (window.innerHeight - img.height * ratio) / 2;
                    context.clearRect(0, 0, window.innerWidth, window.innerHeight);
                    context.drawImage(img, x, y, img.width * ratio, img.height * ratio);
                    lastFrame = frameIndex;
                }
            }

            // UI Updates
            document.getElementById('hero-text-container').style.opacity = 1 - (fraction * 4);
            document.getElementById('label-1').style.opacity = (fraction > 0.2 && fraction < 0.4) ? 1 : 0;
            document.getElementById('label-2').style.opacity = (fraction > 0.5 && fraction < 0.7) ? 1 : 0;
        }

        window.addEventListener('scroll', () => render());
        window.addEventListener('resize', initCanvas);

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('translate-x-full');
        }
    </script>
</body></html>
