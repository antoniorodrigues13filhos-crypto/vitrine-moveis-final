<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Móvel | Office Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-primary: #111111;
            --color-secondary: #2A2A2A;
            --color-border-light: #E5E5E5;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
    </style>

    <style>
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        
        .extreme-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }

        /* CHAT WRAPPER */
        #chat-wrapper {
            position: fixed;
            bottom: 100px;
            right: 32px;
            width: 350px;
            height: 480px;
            z-index: 100;
            display: none; 
            flex-direction: column;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.15);
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glass-fab {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: transform 0.3s ease;
            cursor: pointer;
        }
        .glass-fab:hover { transform: scale(1.1); background: rgba(255, 255, 255, 0.6); }

        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .bot-bubble { background: rgba(255, 255, 255, 0.3); align-self: flex-start; border-radius: 15px; border-bottom-left-radius: 2px; padding: 10px 14px; max-width: 85%; margin-bottom: 8px; }
        .user-bubble { background: #111; color: #fff; align-self: flex-end; border-radius: 15px; border-bottom-right-radius: 2px; padding: 10px 14px; max-width: 85%; margin-bottom: 8px; }
    </style>
</head>
<body class="bg-white text-primary font-sans antialiased relative">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h2 class="text-white font-serif text-2xl tracking-widest uppercase">VITRINE MÓVEL</h2>
        <div style="width:10rem; height:2px; background:rgba(255,255,255,0.2); margin-top:10px; border-radius:2px; overflow:hidden;">
            <div id="progress-bar" style="width:0%; height:100%; background:#fff; transition: 0.3s;"></div>
        </div>
    </div>

    <header class="extreme-glass fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-10 py-4">
        <nav class="hidden md:flex gap-8 text-sm font-medium uppercase tracking-widest">
            <a href="#produtos">Produtos</a>
        </nav>
        <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" class="h-10 brightness-0" alt="Logo">
        <nav class="hidden md:flex gap-8 text-sm font-medium uppercase tracking-widest">
            <a href="#contato">Fale Conosco</a>
        </nav>
    </header>

    <div id="chat-launcher" onclick="toggleChat()" class="glass-fab fixed bottom-8 right-28 w-14 h-14 rounded-full flex items-center justify-center z-50">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    </div>

    <div id="chat-wrapper">
        <div style="padding: 15px; background: rgba(255,255,255,0.15); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1);">
            <div style="display: flex; align-items: center; gap: 8px;">
                <div style="width: 8px; height: 8px; background: #10b981; border-radius: 50%;"></div>
                <span style="font-size: 11px; font-weight: bold; letter-spacing: 1px; color: #111;">CONSULTOR VM</span>
            </div>
            <button onclick="toggleChat()" style="cursor: pointer; font-size: 20px; line-height: 1; color: #111;">&times;</button>
        </div>
        
        <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; font-size: 13px;">
            <div class="bot-bubble">
                Olá, Rodrigo! Sou o Marco. Como posso ajudar com seu ambiente hoje?
            </div>
        </div>

        <div style="padding: 15px; display: flex; gap: 8px; background: rgba(255,255,255,0.1);">
            <input type="text" id="chat-in" placeholder="Sua dúvida..." style="flex: 1; background: rgba(255,255,255,0.5); border: none; padding: 10px; border-radius: 12px; outline: none; font-size: 13px; color: #000;">
            <button onclick="enviarChat()" style="background: #111; color: #fff; border: none; padding: 0 15px; border-radius: 12px; font-weight: bold; cursor: pointer;">></button>
        </div>
    </div>

    <main>
        <section id="scroll-hero" style="height:400vh; position:relative;">
            <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
                <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"></canvas>
                <div id="hero-text" class="absolute inset-0 flex flex-col items-center justify-center text-center z-10 pointer-events-none">
                    <h1 class="font-serif text-6xl md:text-8xl text-white font-bold leading-tight">A Arte de Equipar<br><span class="italic font-light">Seu Espaço</span></h1>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-7xl mx-auto">
            <h2 class="font-serif text-4xl mb-12 text-primary">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
        </section>
    </main>

    <a href="https://wa.me/5511999999999" class="glass-fab fixed bottom-8 right-8 w-14 h-14 rounded-full flex items-center justify-center z-50">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M22 17a2 2 0 0 1-2 2H6.828a2 2 0 0 0-1.414.586l-2.202 2.202A.71.71 0 0 1 2 21.286V5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2z"></path></svg>
    </a>

    <script>
        function toggleChat() {
            const chat = document.getElementById('chat-wrapper');
            const isHidden = chat.style.display === 'none' || chat.style.display === '';
            chat.style.display = isHidden ? 'flex' : 'none';
        }

        const WEBHOOK_MAKE = 'SUA_URL_DO_MAKE_AQUI'; 

        async function enviarChat() {
            const input = document.getElementById('chat-in');
            const msg = input.value.trim();
            if(!msg) return;

            addMsg(msg, 'user');
            input.value = '';

            try {
                const res = await fetch(WEBHOOK_MAKE, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mensagem: msg, nome: "Rodrigo" })
                });
                const data = await res.json();
                if(data.resposta) addMsg(data.resposta, 'bot');
            } catch(e) {
                addMsg("Erro ao conectar com o Marco.", 'bot');
            }
        }

        function addMsg(txt, type) {
            const area = document.getElementById('chat-messages');
            const div = document.createElement('div');
            div.className = type === 'bot' ? 'bot-bubble' : 'user-bubble';
            div.innerText = txt;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        // ORIGINAL LOGIC
        const products = [
            { id: "OF-01", name: "Cadeira Executiva Aura", material: "Couro Legítimo & Alumínio", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&q=80&w=1200" },
            { id: "ST-04", name: "Mesa Diretoria Nexus", material: "Nogueira Maciça & Vidro Temperado", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&q=80&w=1200" }
        ];

        const gridContainer = document.getElementById('product-grid');
        gridContainer.innerHTML = products.map(prod => `
            <div class="group cursor-pointer">
                <div class="relative h-[400px] overflow-hidden rounded-2xl bg-gray-100 mb-4">
                    <img src="${prod.image}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <h3 class="font-serif text-2xl">${prod.name}</h3>
                <p class="text-sm text-gray-500">${prod.material}</p>
            </div>
        `).join('');

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 54;
        const images = [];
        let loadedImages = 0;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages/frameCount)*100}%`;
                if(loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.visibility = 'hidden', 500);
                    render();
                }
            };
            img.src = `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            images.push(img);
        }

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scrollTop = window.scrollY;
            const heroHeight = document.getElementById('scroll-hero').offsetHeight;
            const fraction = Math.max(0, Math.min(1, scrollTop / (heroHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));
            const img = images[frameIndex];
            if (img) {
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width - img.width * ratio) / 2;
                const y = (canvas.height - img.height * ratio) / 2;
                context.drawImage(img, x, y, img.width * ratio, img.height * ratio);
            }
        }

        window.addEventListener('scroll', render);
        window.addEventListener('resize', render);
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        document.getElementById('chat-in').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarChat(); });
    </script>
</body>
</html>
