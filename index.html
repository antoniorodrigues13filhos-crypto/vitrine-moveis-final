<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Móvel | Consultoria de Luxo</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        /* RESET E BASE */
        * { margin: 0; padding: 0; box-box-sizing: border-box; }
        body { 
            background: #050505; 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            color: white;
        }

        /* CONTAINER DO CHAT */
        #chat-container {
            width: 100%;
            max-width: 450px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        /* CABEÇALHO */
        .chat-header {
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chat-header h2 { font-weight: 600; font-size: 1.1rem; letter-spacing: 1px; color: #d4af37; }

        /* ÁREA DE MENSAGENS */
        #messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            scrollbar-width: none;
        }
        #messages-area::-webkit-scrollbar { display: none; }

        /* ESTILO DAS BOLHAS */
        .wrapper { display: flex; align-items: flex-end; gap: 10px; animation: slideUp 0.4s ease-out; }
        .user-wrapper { flex-direction: row-reverse; }

        .avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            border: 1px solid rgba(212, 175, 55, 0.5);
            background: url('https://i.pravatar.cc/150?u=marco_vitrine') center/cover;
        }

        .bubble {
            max-width: 75%;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            border-radius: 18px;
        }

        .bot-bubble {
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #efefef;
            border-bottom-left-radius: 4px;
        }

        .user-bubble {
            background: #d4af37;
            color: #000;
            border-bottom-right-radius: 4px;
            font-weight: 500;
        }

        /* CAMPO DE ENTRADA */
        .input-area {
            padding: 20px;
            display: flex;
            gap: 10px;
            background: rgba(0, 0, 0, 0.2);
        }
        input {
            flex: 1;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            border-radius: 15px;
            color: white;
            outline: none;
        }
        button {
            background: #d4af37;
            border: none;
            padding: 10px 20px;
            border-radius: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover { opacity: 0.8; }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

<div id="chat-container">
    <div class="chat-header">
        <h2>VITRINE MÓVEL</h2>
    </div>
    
    <div id="messages-area">
        <div class="wrapper">
            <div class="avatar"></div>
            <div class="bubble bot-bubble">Olá! Sou o Marco, seu consultor. Como posso transformar seu ambiente hoje?</div>
        </div>
    </div>

    <div class="input-area">
        <input type="text" id="user-input" placeholder="Pergunte sobre um móvel...">
        <button onclick="enviarMensagem()">Enviar</button>
    </div>
</div>

<script>
    const messagesArea = document.getElementById('messages-area');
    const userInput = document.getElementById('user-input');

    // URL do seu Webhook do Make (COLE A SUA AQUI)
    const WEBHOOK_URL = 'SUA_URL_DO_MAKE_AQUI';

    async function enviarMensagem() {
        const texto = userInput.value.trim();
        if (!texto) return;

        // 1. Mostrar mensagem do usuário
        adicionarMensagem(texto, 'user');
        userInput.value = '';

        // 2. Criar bolha de "digitando"
        const typingId = mostrarDigitando();

        try {
            const response = await fetch(WEBHOOK_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ mensagem: texto, nome: "Rodrigo" }) // Enviando contexto
            });

            const data = await response.json();
            
            // Remover bolha de digitando e exibir resposta real
            document.getElementById(typingId).remove();
            
            if (data.resposta) {
                exibirRespostaSuave(data.resposta);
            }
        } catch (error) {
            document.getElementById(typingId).remove();
            exibirRespostaSuave("Desculpe, tive um problema na conexão. Pode repetir?");
        }
    }

    function adicionarMensagem(texto, remetente) {
        const wrapper = document.createElement('div');
        wrapper.className = `wrapper ${remetente}-wrapper`;
        wrapper.innerHTML = `<div class="bubble ${remetente}-bubble">${texto}</div>`;
        messagesArea.appendChild(wrapper);
        scrollToBottom();
    }

    function mostrarDigitando() {
        const id = 'typing-' + Date.now();
        const wrapper = document.createElement('div');
        wrapper.className = 'wrapper';
        wrapper.id = id;
        wrapper.innerHTML = `
            <div class="avatar"></div>
            <div class="bubble bot-bubble">...</div>
        `;
        messagesArea.appendChild(wrapper);
        scrollToBottom();
        return id;
    }

    function exibirRespostaSuave(texto) {
        const wrapper = document.createElement('div');
        wrapper.className = 'wrapper';
        wrapper.innerHTML = `
            <div class="avatar"></div>
            <div class="bubble bot-bubble" id="typing-text"></div>
        `;
        messagesArea.appendChild(wrapper);
        
        const elemento = wrapper.querySelector('#typing-text');
        let i = 0;

        function digitar() {
            if (i < texto.length) {
                elemento.innerHTML += texto.charAt(i);
                i++;
                scrollToBottom();
                setTimeout(digitar, 25);
            }
        }
        digitar();
    }

    function scrollToBottom() {
        messagesArea.scrollTop = messagesArea.scrollHeight;
    }

    // Enviar com a tecla Enter
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') enviarMensagem();
    });
</script>

</body>
</html>
