<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth"><head><script data-buildix-nav-interceptor="">
(function() {
  document.addEventListener('click', function(e) {
    var target = e.target;
    while (target && target.tagName !== 'A' && target !== document.body) {
      target = target.parentElement;
    }
    if (target && target.tagName === 'A') {
      var href = target.getAttribute('href') || '';
      if (href.charAt(0) === '#') {
        e.preventDefault();
        e.stopPropagation();
        e.stopImmediatePropagation();
        if (href.length > 1) {
          var targetEl = document.getElementById(href.substring(1));
          if (targetEl) {
            targetEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }
        }
        return false;
      }
    }
  }, true);
  window.addEventListener('hashchange', function(e) {
    e.preventDefault();
  }, true);
})();
</script>
    <meta charset="UTF-8">

@theme {

<style>
html.lenis { height: auto; }
.lenis.lenis-smooth { scroll-behavior: auto !important; }
body { overflow-x: hidden; background: #fff; }

.extreme-glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
    transform: translate3d(-50%, 0, 0); 
    backface-visibility: hidden;
    transition: background 0.4s cubic-bezier(0.16, 1, 0.3, 1);
}

.glass-fab {
    background: #ffffff !important;
    border: 1px solid rgba(0, 0, 0, 0.1);
    box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
    transition: all 0.3s ease;
    display: flex !important;
    z-index: 100 !important;
}

.nav-link { position: relative; color: #111; }
.nav-link::after {
    content: ''; position: absolute; width: 0; height: 1px; bottom: -2px; left: 0;
    background-color: #111; transition: width 0.3s ease;
}
.nav-link:hover::after { width: 100%; }

#hero-text-container { transition: opacity 0.5s ease-out, transform 0.5s ease-out; }
.product-image { transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1), filter 0.7s ease; }

@media (max-width: 768px) {
    .product-image { filter: grayscale(0%) !important; }
}
@media (min-width: 769px) {
    .product-image { filter: grayscale(100%); }
    .group:hover .product-image { filter: grayscale(0%); transform: scale(1.05); }
}

.glass-input {
    background: rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 0, 0, 0.1);
    backdrop-filter: blur(10px);
    transition: all 0.3s ease;
}
.glass-input:focus { border-color: #111; transform: translateY(-2px); }
</style>
</head>
<body class="bg-white text-primary font-sans antialiased relative">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.5s;">

        <div style="width:16rem;height:0.5rem;background:rgba(255,255,255,0.3);border-radius:9999px;overflow:hidden;">
            <div id="progress-bar" style="height: 100%; background: white; width: 0%;"></div>
        </div>
    </div>

    <header class="extreme-glass fixed top-6 left-1/2 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-10 py-4">
        <nav class="hidden md:flex items-center gap-8">
            <a href="#produtos" class="nav-link text-sm font-medium tracking-wide">Produtos</a>
        </nav>
        <a href="#" class="absolute left-1/2 -translate-x-1/2 hover:scale-105 transition-transform duration-300">
            <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" alt="logo" class="h-8 md:h-10 brightness-0">
        </a>
        <nav class="hidden md:flex items-center gap-8">
            <a href="#solucoes" class="nav-link text-sm font-medium tracking-wide">Soluções</a>
            <a href="#contato" class="nav-link text-sm font-medium tracking-wide">Contato</a>
        </nav>
        <button onclick="toggleMenu()" class="md:hidden ml-auto p-1 z-[60] relative">
            <svg id="menu-icon" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 5h16M4 12h16M4 19h16"></path></svg>
        </button>
    </header>

    <div id="mobile-menu" class="fixed inset-0 bg-white/95 backdrop-blur-xl z-[55] translate-x-full flex flex-col items-center justify-center gap-8 transition-transform duration-500">
        <a href="#produtos" onclick="toggleMenu()" class="font-serif text-3xl">Produtos</a>
        <a href="#solucoes" onclick="toggleMenu()" class="font-serif text-3xl">Soluções</a>
        <a href="#contato" onclick="toggleMenu()" class="font-serif text-3xl">Contato</a>
    </div>

    <main>
        <section id="scroll-hero" style="height:400vh;position:relative;">
            <div style="position:sticky;top:0;height:100vh;width:100%;overflow:hidden;">
                <canvas id="hero-canvas" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;"></canvas>
                <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);z-index:1;"></div>
                <div id="hero-text-container" class="absolute inset-0 z-10 flex flex-col items-center justify-center text-center px-6 pointer-events-none">
                    <h1 class="font-serif text-5xl md:text-8xl font-bold text-white tracking-tight leading-tight">
                        A Arte de Equipar<br><span class="italic text-white/90 font-light">Seu Espaço</span>
                    </h1>
                </div>
            </div>
        </section>

        <section class="py-32 px-6 max-w-7xl mx-auto relative bg-white z-20">
            <div class="flex flex-col md:flex-row gap-16">
                <div class="w-full md:w-1/3">
                    <h2 class="font-serif text-3xl md:text-4xl">Redefinindo o Padrão Corporativo.</h2>
                    <div class="w-12 h-[1px] bg-primary my-6"></div>
                </div>
                <div class="w-full md:w-2/3">
                    <p class="text-lg md:text-xl text-primary/80 font-light leading-relaxed">
                        Acreditamos que o ambiente de trabalho molda a mente. Nossas peças são instrumentos de foco e criação.
                    </p>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-[90rem] mx-auto border-t border-border-light relative z-20 bg-white">
            <h2 class="font-serif text-4xl mb-16">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-16"></div>
        </section>

        <section id="contato" class="py-32 px-6 bg-[#F9F9F9] relative z-20">
            <div class="max-w-4xl mx-auto text-center">
                <h2 class="font-serif text-4xl md:text-5xl mb-12">Solicite um Orçamento</h2>
                <form id="lead-form" class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
                    <input type="text" name="nome" required placeholder="Nome Completo" class="glass-input p-4 rounded-xl outline-none">
                    <input type="email" name="email" required placeholder="E-mail Corporativo" class="glass-input p-4 rounded-xl outline-none">
                    <textarea name="mensagem" rows="4" placeholder="Sua mensagem" class="glass-input p-4 rounded-xl outline-none resize-none md:col-span-2"></textarea>
                    <button type="submit" id="submit-btn" class="md:col-span-2 bg-primary text-white font-bold py-5 rounded-xl hover:scale-[1.02] active:scale-[0.98] transition-all shadow-xl">
                        ENVIAR SOLICITAÇÃO
                    </button>
                </form>
            </div>
        </section>
    </main>

    <a href="https://wa.me/5511999999999" target="_blank" class="glass-fab fixed bottom-8 right-8 w-14 h-14 rounded-full flex items-center justify-center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-primary"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
    </a>

    <script>
        const products = [
            { id: "OF-01", name: "Cadeira Executiva Aura", material: "Couro Legítimo & Alumínio", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&q=80&w=1200", badge: "Ergonomia Premium" },
            { id: "ST-04", name: "Mesa Diretoria Nexus", material: "Nogueira Maciça & Vidro Temperado", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&q=80&w=1200", badge: "Maciça" },
            { id: "AC-12", name: "Luminária Horizon", material: "Aço Escovado & LED", image: "https://images.unsplash.com/photo-1517502884422-41eaead166d4?auto=format&fit=crop&q=80&w=1200", badge: "Design" },
            { id: "SF-08", name: "Sofá Lounge Apex", material: "Sintético Premium", image: "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&q=80&w=1200", badge: "Conforto" }
        ];

        document.getElementById('product-grid').innerHTML = products.map(prod => `
            <div class="group cursor-pointer">
                <div class="relative w-full h-[500px] overflow-hidden rounded-2xl border border-border-light bg-[#F5F5F5] mb-6">
                    <img src="${prod.image}" alt="${prod.name}" class="product-image absolute top-0 left-0 w-full h-full object-cover grayscale">
                    <div class="absolute top-4 left-4 bg-white/90 px-3 py-1 rounded-full border border-border-light">
                        <span class="font-mono text-[10px] uppercase tracking-widest text-primary font-bold">${prod.badge}</span>
                    </div>
                </div>
                <h3 class="font-serif text-2xl mb-1">${prod.name}</h3>
                <p class="font-sans text-sm text-primary/60 font-light">${prod.material}</p>
            </div>
        `).join('');

        const lenis = new Lenis({ lerp: 0.05 });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 54; 
        const images = [];
        let loadedImages = 0;

        const getPath = i => `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages / frameCount) * 100}%`;
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 500);
                    render();
                }
            };
            img.src = getPath(i);
            images.push(img);
        }

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const fraction = Math.max(0, Math.min(1, window.scrollY / (document.getElementById('scroll-hero').offsetHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));

            const img = images[frameIndex];
            if (img && img.complete) {
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                context.drawImage(img, (canvas.width - img.width * ratio) / 2, (canvas.height - img.height * ratio) / 2, img.width * ratio, img.height * ratio);
            }

            const heroText = document.getElementById('hero-text-container');
            heroText.style.opacity = Math.max(0, 1 - (fraction * 12));
            heroText.style.transform = `translateY(${fraction * -50}px)`;
        }
        
        window.addEventListener('scroll', render);
        window.addEventListener('resize', render);

        function toggleMenu() {
            const menu = document.getElementById('mobile-menu');
            menu.classList.toggle('translate-x-full');
        }

        // INTEGRAÇÃO MAKE.COM
        document.getElementById('lead-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            btn.innerText = "ENVIANDO...";
            btn.disabled = true;

            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);

            try {
                await fetch('https://hook.us2.make.com/nodnz5uzkjsu6wnha8phgh8eo1ccpfdj', {
                    method: 'POST',
                    body: JSON.stringify(data),
                    headers: { 'Content-Type': 'application/json' }
                });
                btn.innerText = "ENVIADO COM SUCESSO!";
                btn.style.background = "#22c55e";
                e.target.reset();
            } catch (err) {
                btn.innerText = "ERRO. TENTE NOVAMENTE.";
                btn.disabled = false;
            }
        });
    </script>
</body></html>
