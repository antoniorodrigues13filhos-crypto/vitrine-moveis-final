<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vitrine Móvel | Office Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
        @theme {
            --color-primary: #111111;
            --color-secondary: #2A2A2A;
            --color-border-light: #E5E5E5;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
            --font-sans: 'Inter', sans-serif;
        }
    </style>

    <style>
        html.lenis { height: auto; }
        .lenis.lenis-smooth { scroll-behavior: auto !important; }
        .extreme-glass {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.1);
        }
    </style>
</head>
<body class="bg-white text-primary font-sans antialiased relative">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center;">
        <h2 class="text-white font-serif text-2xl tracking-widest uppercase">VITRINE MÓVEL</h2>
        <div style="width:10rem; height:2px; background:rgba(255,255,255,0.2); margin-top:10px; border-radius:2px; overflow:hidden;">
            <div id="progress-bar" style="width:0%; height:100%; background:#fff; transition: 0.3s;"></div>
        </div>
    </div>

    <header class="extreme-glass fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-10 py-4">
        <nav class="hidden md:flex gap-8 text-sm font-medium uppercase tracking-widest">
            <a href="#produtos">Produtos</a>
        </nav>
        <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" class="h-10 brightness-0" alt="Logo">
        <nav class="hidden md:flex gap-8 text-sm font-medium uppercase tracking-widest">
            <a href="#contato">Fale Conosco</a>
        </nav>
    </header>

    <main>
        <section id="scroll-hero" style="height:400vh; position:relative;">
            <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
                <canvas id="hero-canvas" style="position:absolute; inset:0; width:100%; height:100%; object-fit:cover;"></canvas>
                <div id="hero-text" class="absolute inset-0 flex flex-col items-center justify-center text-center z-10 pointer-events-none">
                    <h1 class="font-serif text-6xl md:text-8xl text-white font-bold leading-tight">A Arte de Equipar<br><span class="italic font-light">Seu Espaço</span></h1>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-7xl mx-auto">
            <h2 class="font-serif text-4xl mb-12">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
        </section>
    </main>

    <div id="chat-ia-launcher" onclick="toggleChatIA()" style="position: fixed; bottom: 30px; right: 30px; width: 65px; height: 65px; background: #25D366; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; z-index: 9999; box-shadow: 0 4px 15px rgba(0,0,0,0.3); transition: transform 0.3s ease;">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 1 1-7.6-10.6 8.38 8.38 0 0 1 3.9.9L21 3z"></path></svg>
    </div>

    <div id="chat-ia-window" style="position: fixed; bottom: 110px; right: 30px; width: 340px; height: 480px; background: white; border-radius: 20px; display: none; flex-direction: column; z-index: 9999; box-shadow: 0 15px 40px rgba(0,0,0,0.4); overflow: hidden; font-family: 'Inter', sans-serif;">
        <div style="background: #25D366; padding: 18px; color: white; font-weight: bold; display: flex; justify-content: space-between; align-items: center;">
            <div style="display:flex; align-items:center; gap:10px;">
                <div style="width:10px; height:10px; background:#fff; border-radius:50%; animation: pulse 1.5s infinite;"></div>
                <span>Atendente Vitrine</span>
            </div>
            <button onclick="toggleChatIA()" style="background:none; border:none; color:white; font-size:24px; cursor:pointer; line-height:1;">&times;</button>
        </div>
        <div id="chat-ia-messages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #f0f2f5; color: black; font-size: 14px;">
            <div style="background: white; padding: 12px; border-radius: 12px; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); border-bottom-left-radius: 2px;">
                Olá! Sou o assistente da Vitrine Móvel. Como posso ajudar com seu orçamento hoje?
            </div>
        </div>
        <div style="padding: 15px; display: flex; gap: 10px; background: white; border-top: 1px solid #eee;">
            <input type="text" id="chat-ia-input" placeholder="Pergunte sobre um produto..." style="flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 10px; outline: none; font-size: 14px; color:#000;">
            <button onclick="enviarChatIA()" style="background: #25D366; color: white; border: none; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: bold;">></button>
        </div>
    </div>

    <script>
        function toggleChatIA() {
            const win = document.getElementById('chat-ia-window');
            win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
        }

        async function enviarChatIA() {
            const input = document.getElementById('chat-ia-input');
            const text = input.value.trim();
            if(!text) return;

            addMsgIA(text, 'user');
            input.value = '';

            try {
                const res = await fetch('https://hook.us2.make.com/nodnz5uzkjsu6wnha8phgh8eo1ccpfdj', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ mensagem: text, nome: "Rodrigo" })
                });
                const data = await res.json();
                if(data.resposta) addMsgIA(data.resposta, 'bot');
            } catch(e) {
                addMsgIA("Desculpe, Rodrigo. Tive um erro de conexão.", 'bot');
            }
        }

        function addMsgIA(txt, type) {
            const area = document.getElementById('chat-ia-messages');
            const div = document.createElement('div');
            div.style.padding = '12px';
            div.style.borderRadius = '12px';
            div.style.maxWidth = '85%';
            div.style.boxShadow = '0 1px 2px rgba(0,0,0,0.1)';
            if(type === 'user') {
                div.style.background = '#dcf8c6';
                div.style.alignSelf = 'flex-end';
                div.style.borderBottomRightRadius = '2px';
            } else {
                div.style.background = 'white';
                div.style.alignSelf = 'flex-start';
                div.style.borderBottomLeftRadius = '2px';
            }
            div.innerText = txt;
            area.appendChild(div);
            area.scrollTop = area.scrollHeight;
        }

        document.getElementById('chat-ia-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') enviarChatIA(); });

        // SCRIPTS ORIGINAIS PRESERVADOS
        const products = [
            { id: "OF-01", name: "Cadeira Executiva Aura", material: "Couro Legítimo & Alumínio", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?auto=format&fit=crop&q=80&w=1200" },
            { id: "ST-04", name: "Mesa Diretoria Nexus", material: "Nogueira Maciça & Vidro Temperado", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?auto=format&fit=crop&q=80&w=1200" }
        ];

        const gridContainer = document.getElementById('product-grid');
        gridContainer.innerHTML = products.map(prod => `
            <div class="group cursor-pointer">
                <div class="relative h-[400px] overflow-hidden rounded-2xl bg-gray-100 mb-4">
                    <img src="${prod.image}" class="w-full h-full object-cover grayscale group-hover:grayscale-0 transition-all duration-700">
                </div>
                <h3 class="font-serif text-2xl">${prod.name}</h3>
                <p class="text-sm text-gray-500">${prod.material}</p>
            </div>
        `).join('');

        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d");
        const frameCount = 54;
        const images = [];
        let loadedImages = 0;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages/frameCount)*100}%`;
                if(loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.visibility = 'hidden', 500);
                    render();
                }
            };
            img.src = `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;
            images.push(img);
        }

        function render() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            const scrollTop = window.scrollY;
            const heroHeight = document.getElementById('scroll-hero').offsetHeight;
            const fraction = Math.max(0, Math.min(1, scrollTop / (heroHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));
            const img = images[frameIndex];
            if (img) {
                const ratio = Math.max(canvas.width / img.width, canvas.height / img.height);
                const x = (canvas.width - img.width * ratio) / 2;
                const y = (canvas.height - img.height * ratio) / 2;
                context.drawImage(img, x, y, img.width * ratio, img.height * ratio);
            }
        }

        window.addEventListener('scroll', render);
        window.addEventListener('resize', render);
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>
    <style>@keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }</style>
</body>
</html>
