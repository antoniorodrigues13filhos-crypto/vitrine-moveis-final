<!DOCTYPE html>
<html lang="pt-BR" class="lenis lenis-smooth"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Vitrine Móvel | Office Solutions</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&amp;display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/@studio-freight/lenis@1.0.42/dist/lenis.min.js"></script>

    <style type="text/tailwindcss">
@theme {
            --color-primary: #111111;
            --color-secondary: #2A2A2A;
            --color-border-light: #E5E5E5;
            --font-serif: 'Playfair Display', serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
</style>
<style>
/* Reset radical para evitar pulos no Mobile */
html, body { 
    overflow-x: hidden; 
    overscroll-behavior-y: none;
    -webkit-font-smoothing: antialiased;
}

html.lenis { height: auto; }
.lenis.lenis-smooth { scroll-behavior: auto !important; }

/* Trava o Canvas para não dar zoom */
#hero-canvas { 
    display: block;
    width: 100vw !important;
    height: 100vh !important;
    touch-action: none; 
    object-fit: cover;
    contain: strict; /* Performance extrema */
    will-change: transform;
}

.extreme-glass {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(40px);
    -webkit-backdrop-filter: blur(40px);
    border: 1px solid rgba(255, 255, 255, 0.25);
    transform: translate3d(-50%, 0, 0); 
}

/* Produtos: Zoom controlado e instantâneo */
.product-image-container img {
    filter: grayscale(100%);
    transition: filter 0.3s ease, transform 0.3s ease;
}

.product-card.active img, .product-card:hover img {
    filter: grayscale(0%) !important;
    transform: scale(1.05);
}

#hero-text-container {
    pointer-events: none;
    will-change: opacity;
}

.floating-label {
    pointer-events: none;
    transition: opacity 0.3s ease, transform 0.3s ease;
}
</style>
</head>
<body class="bg-white text-primary font-sans">

    <div id="loader" style="position: fixed; inset: 0px; background: #111; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; transition: opacity 0.4s;">
        <h2 class="text-2xl font-serif text-white mb-4 uppercase tracking-widest">VITRINE</h2>
        <div style="width:10rem;height:1px;background:rgba(255,255,255,0.2);"><div id="progress-bar" style="height:100%;background:white;width:0%;"></div></div>
    </div>

    <header class="extreme-glass fixed top-6 left-1/2 w-[90%] max-w-7xl rounded-full z-50 flex items-center justify-between px-8 py-4">
        <nav class="hidden md:flex gap-8">
            <a href="#produtos" class="text-sm font-medium">Produtos</a>
        </nav>
        <a href="#" class="absolute left-1/2 -translate-x-1/2 select-none z-20">
            <img src="https://buildix-user-images.s3.us-east-2.amazonaws.com/user-images/207d01fe-9154-44a2-a035-5a4810effc12.webp" class="h-8 md:h-9 brightness-0">
        </a>
        <nav class="hidden md:flex gap-8">
            <a href="#contato" class="text-sm font-medium">Contato</a>
        </nav>
        <button onclick="toggleMenu()" class="md:hidden ml-auto p-1 z-[60] relative">
            <svg id="menu-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
    </header>

    <div id="mobile-menu" class="fixed inset-0 bg-white z-[55] translate-x-full flex flex-col items-center justify-center gap-10 transition-transform duration-500">
        <a href="#produtos" onclick="toggleMenu()" class="font-serif text-4xl">Produtos</a>
        <a href="#contato" onclick="toggleMenu()" class="font-serif text-4xl">Contato</a>
    </div>

    <main>
        <section id="scroll-hero" style="height:400vh; position:relative;">
            <div style="position:sticky; top:0; height:100vh; width:100%; overflow:hidden;">
                <canvas id="hero-canvas"></canvas>
                
                <div id="label-1" class="floating-label absolute top-[30%] left-[10%] opacity-0 z-20">
                    <h3 class="text-white text-xl font-serif italic border-l border-white/30 pl-4">Alumínio</h3>
                </div>
                <div id="label-2" class="floating-label absolute top-[55%] right-[10%] opacity-0 z-20 text-right">
                    <h3 class="text-white text-xl font-serif italic border-r border-white/30 pr-4">Couro</h3>
                </div>

                <div style="position:absolute; inset:0; background:linear-gradient(to top, rgba(0,0,0,0.7), transparent 70%); z-index:1;"></div>
                
                <div id="hero-text-container" class="absolute inset-0 z-10 flex flex-col items-center justify-center text-center">
                    <h1 class="font-serif text-5xl md:text-8xl font-bold text-white tracking-tight">A Arte de Equipar<br><span class="italic text-white/80 font-light text-4xl md:text-7xl">Seu Espaço</span></h1>
                </div>
            </div>
        </section>

        <section id="produtos" class="py-24 px-6 max-w-7xl mx-auto">
            <h2 class="font-serif text-4xl mb-16 border-b border-black/10 pb-4">Coleção Executiva</h2>
            <div id="product-grid" class="grid grid-cols-1 md:grid-cols-2 gap-12"></div>
        </section>
    </main>

    <script>
        // 1. Produtos
        const products = [
            { id: "01", name: "Cadeira Aura", image: "https://images.unsplash.com/photo-1505843490538-5133c6c7d0e1?q=80&w=1200" },
            { id: "02", name: "Mesa Nexus", image: "https://images.unsplash.com/photo-1518455027359-f3f8164ba6bd?q=80&w=1200" }
        ];

        document.getElementById('product-grid').innerHTML = products.map(p => `
            <div class="product-card group cursor-pointer overflow-hidden rounded-xl">
                <div class="product-image-container relative h-[450px] bg-gray-50 overflow-hidden">
                    <img src="${p.image}" class="w-full h-full object-cover">
                </div>
                <div class="py-4">
                    <h3 class="font-serif text-2xl">${p.name}</h3>
                </div>
            </div>
        `).join('');

        // Toque Instantâneo
        document.querySelectorAll('.product-card').forEach(card => {
            card.addEventListener('touchstart', () => card.classList.add('active'), {passive: true});
            card.addEventListener('touchend', () => card.classList.remove('active'), {passive: true});
        });

        // 2. Lenis Calibrado para Mobile
        const lenis = new Lenis({
            duration: 0.8,
            lerp: 0.15,
            touchMultiplier: 1.2
        });
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        // 3. Motor do Canvas Estabilizado
        const canvas = document.getElementById("hero-canvas");
        const context = canvas.getContext("2d", { alpha: false, desynchronized: true });
        const frameCount = 54;
        const images = [];
        let loadedImages = 0;
        let lastFrame = -1;

        // Trava as dimensões iniciais para evitar zoom no resize do mobile
        const dpr = Math.min(window.devicePixelRatio, 2);
        let cw = window.innerWidth;
        let ch = window.innerHeight;
        
        canvas.width = cw * dpr;
        canvas.height = ch * dpr;
        context.scale(dpr, dpr);

        const getPath = i => `./frames/ezgif-frame-${i.toString().padStart(3, '0')}.jpg`;

        for (let i = 1; i <= frameCount; i++) {
            const img = new Image();
            img.onload = () => {
                loadedImages++;
                document.getElementById('progress-bar').style.width = `${(loadedImages/frameCount)*100}%`;
                if (loadedImages === frameCount) {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 400);
                    render(true);
                }
            };
            img.src = getPath(i);
            images.push(img);
        }

        function render(force = false) {
            const fraction = Math.max(0, Math.min(1, window.scrollY / (document.getElementById('scroll-hero').offsetHeight - window.innerHeight)));
            const frameIndex = Math.min(frameCount - 1, Math.floor(fraction * frameCount));

            if (frameIndex !== lastFrame || force) {
                const img = images[frameIndex];
                if (img && img.complete) {
                    const ratio = Math.max(cw / img.width, ch / img.height);
                    context.drawImage(img, (cw - img.width * ratio)/2, (ch - img.height * ratio)/2, img.width * ratio, img.height * ratio);
                    lastFrame = frameIndex;
                }
            }

            document.getElementById('hero-text-container').style.opacity = 1 - (fraction * 5);
            document.getElementById('label-1').style.opacity = (fraction > 0.15 && fraction < 0.35) ? 1 : 0;
            document.getElementById('label-2').style.opacity = (fraction > 0.45 && fraction < 0.65) ? 1 : 0;
        }

        lenis.on('scroll', () => render());

        function toggleMenu() {
            document.getElementById('mobile-menu').classList.toggle('translate-x-full');
        }
    </script>
</body></html>
